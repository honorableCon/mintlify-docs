<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1F1A"/>
      <stop offset="100%" style="stop-color:#0A1510"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E896"/>
      <stop offset="100%" style="stop-color:#00B874"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7C948"/>
      <stop offset="100%" style="stop-color:#E5A800"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#00E896" stroke-width="0.5">
    <line x1="0" y1="33" x2="100" y2="33"/>
    <line x1="0" y1="66" x2="100" y2="66"/>
    <line x1="33" y1="0" x2="33" y2="100"/>
    <line x1="66" y1="0" x2="66" y2="100"/>
  </g>

  <!-- Document shape background (subtle) -->
  <rect x="28" y="18" width="44" height="56" rx="4" fill="none" stroke="#00E896" stroke-width="0.8" opacity="0.15"/>

  <!-- K - vertical bar -->
  <rect x="30" y="26" width="8" height="40" rx="2" fill="url(#green)"/>

  <!-- K - top diagonal arm -->
  <polygon points="38,46 62,26 68,26 68,32 46,50" fill="url(#green)"/>

  <!-- K - bottom diagonal arm -->
  <polygon points="38,54 62,74 68,74 68,68 46,50" fill="url(#green)"/>

  <!-- Scan line accent -->
  <rect x="28" y="49" width="44" height="2" rx="1" fill="url(#gold)" opacity="0.7"/>

  <!-- Corner accent dots -->
  <circle cx="22" cy="22" r="2" fill="#00E896" opacity="0.4"/>
  <circle cx="78" cy="22" r="2" fill="#00E896" opacity="0.4"/>
  <circle cx="22" cy="78" r="2" fill="#00E896" opacity="0.4"/>
  <circle cx="78" cy="78" r="2" fill="#00E896" opacity="0.4"/>
</svg>
